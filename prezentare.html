<!DOCTYPE html>
<html lang="ro" class="prez-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scriptica — Prezentare</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/prezentare.css">
</head>
<body class="prez-body">

  <div class="prez-deck" role="region" aria-label="Prezentare Scriptica">

    <section class="prez-slide prez-slide--1 prez-slide--active" aria-label="Slide 1 din 3"></section>
    <section class="prez-slide prez-slide--2" aria-label="Slide 2 din 3"></section>
    <section class="prez-slide prez-slide--3" aria-label="Slide 3 din 3"></section>

    <div class="prez-hint" data-prez-hint aria-live="polite">Apăsați din nou pentru a deschide prototipul →</div>

    <nav class="prez-nav" aria-label="Navigare slide-uri">
      <button type="button" class="prez-nav-arrow prez-nav-arrow--disabled" data-prez-prev aria-label="Slide-ul anterior">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      </button>
      <span class="prez-nav-indicator" data-prez-indicator>1 / 3</span>
      <button type="button" class="prez-nav-arrow" data-prez-next aria-label="Slide-ul următor">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
      </button>
    </nav>

  </div>

  <script src="js/prezentare.js"></script>
</body>
</html>
